name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: pipeline
          POSTGRES_DB: sensor_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipeline"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt -r tests/requirements-test.txt

      - name: Run unit tests (SQLite)
        run: pytest tests/ -v

      - name: Run integration tests (PostgreSQL)
        env:
          DATABASE_URL: postgresql://pipeline:pipeline@localhost:5432/sensor_data
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Deploy (placeholder)
        run: |
          echo "Deployment target not configured."
          echo "To deploy, configure these secrets:"
          echo "  DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY"
          echo ""
          echo "Example deployment steps:"
          echo "  1. SSH into target host"
          echo "  2. Pull latest images"
          echo "  3. docker compose up -d"
