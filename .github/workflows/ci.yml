name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: pipeline
          POSTGRES_DB: sensor_data_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipeline"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r api/requirements.txt -r tests/requirements-test.txt

      - name: Run unit tests (SQLite)
        run: pytest tests/ -v

      - name: Run integration tests (PostgreSQL)
        env:
          DATABASE_URL: postgresql://pipeline:pipeline@localhost:5432/sensor_data_test
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/nginx:latest
            ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_HOST != ''
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production host
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          API_IMAGE: ${{ env.API_IMAGE }}:${{ github.sha }}
          NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key \
            docker-compose.prod.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/pipeline/docker-compose.yml"

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/pipeline && \
             export API_IMAGE=$API_IMAGE && \
             export NGINX_IMAGE=$NGINX_IMAGE && \
             export POSTGRES_USER=$POSTGRES_USER && \
             export POSTGRES_PASSWORD=$POSTGRES_PASSWORD && \
             docker compose pull && \
             docker compose up -d --remove-orphans && \
             docker compose ps"
