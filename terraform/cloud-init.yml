#cloud-config

packages:
  - docker

runcmd:
  - systemctl enable docker
  - systemctl start docker

  - mkdir -p /opt/pipeline
  - |
    cat > /opt/pipeline/.env <<'ENVEOF'
    API_IMAGE=${api_image}
    NGINX_IMAGE=${nginx_image}
    POSTGRES_USER=${postgres_user}
    POSTGRES_PASSWORD=${postgres_password}
    APP_PORT=80
    ENVEOF

  - |
    cat > /opt/pipeline/docker-compose.yml <<'COMPOSEEOF'
    services:
      db:
        image: postgres:16-alpine
        environment:
          POSTGRES_USER: $${POSTGRES_USER}
          POSTGRES_PASSWORD: $${POSTGRES_PASSWORD}
          POSTGRES_DB: sensor_data
        volumes:
          - pgdata:/var/lib/postgresql/data
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
          interval: 5s
          timeout: 3s
          retries: 5

      api:
        image: $${API_IMAGE}
        environment:
          DATABASE_URL: postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@db:5432/sensor_data
          API_ROOT_PATH: /api
          ALLOWED_ORIGINS: "*"
        depends_on:
          db:
            condition: service_healthy
        healthcheck:
          test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
          interval: 10s
          timeout: 5s
          retries: 5

      nginx:
        image: $${NGINX_IMAGE}
        ports:
          - "$${APP_PORT:-80}:80"
        depends_on:
          api:
            condition: service_healthy
        healthcheck:
          test: ["CMD", "wget", "-qO-", "http://localhost/"]
          interval: 10s
          timeout: 3s
          retries: 3

    volumes:
      pgdata:
    COMPOSEEOF

  - cd /opt/pipeline && docker compose --env-file .env up -d
